#Workflow for GitHub Actions

name: i2util-workflow
  
on:  
  workflow_dispatch:
    inputs:  
      OS: 
        description: 'OS to build'
        required: true
      BUILD_VARS_JSON:
        description: 'Build var json file'
        required: true
  workflow_run:
    workflows: "Create Artifacts and pass runid"
    branches: 'github-workflow'
    types:
      - completed

jobs:
       
  build-i2util:

     runs-on: ubuntu-latest
     
     steps:
        - name: Check out Repo
          uses: actions/checkout@v4
          with:
           ref: 5.2.0

        - name: Verify BUILD_VARS_JSON
          run: |
            echo "Printing BUILD_VARS_JSON for verification"
            echo " **** next ****"
            echo "${{ github.event.inputs.BUILD_VARS_JSON }}"
            echo " **** next next ****"
            echo "${{ fromJson(github.event.inputs.BUILD_VARS_JSON) }}"  

        - name: Verify BUILD_VARS_JSON
          run: |
                # Parse and pretty-print the JSON using jq
                echo '${{ github.event.inputs.BUILD_VARS_JSON }}' | jq .

        - name: Delete current repo from build
          id: modify_json
          run: |
            modified_json=$(echo '${{ github.event.inputs.BUILD_VARS_JSON }}' | jq 'del(.repos[0])')
            echo "Modified JSON:"
            echo "$modified_json" | jq .
            echo "BUILD_VARS=$modified_json" 
            echo " **** next next ****"
            BUILD_VARS=$(jq -r '.' modified_json)
          #echo "BUILD_VARS=$modified_json" >> $GITHUB_ENV          
            
        - name: Look up the next repo name to build
          id: extract_repo_name
          run: |
            echo "BUILD_VARS_JSON value is: $BUILD_VARS_JSON"
            NEXTREPO=$(echo '${{ github.event.inputs.BUILD_VARS_JSON }}' | jq -r '.repos[0].name' )
            echo "NEXTREPO=${NEXTREPO}" >> $GITHUB_ENV  
            
        - name: Display NEXTREPO value
          run: echo "The value of NEXTREPO is $NEXTREPO"  

